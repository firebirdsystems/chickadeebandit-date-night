<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/run/date-night-planner/" />
  <title>Date Night Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--hub-font, system-ui, sans-serif);
      font-size: var(--hub-font-size, 15px);
      background: var(--hub-bg, #f9fafb);
      color: var(--hub-text, #111827);
      min-height: 100vh;
    }

    .view { display: none; }
    .view.active { display: block; }

    /* ── App header ── */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 0;
    }
    .app-header-left { display: flex; align-items: center; gap: 8px; }
    .app-header .icon { font-size: 1.3rem; }
    .app-header h1 { font-size: 1.25rem; font-weight: 700; }

    /* ── Setup view ── */
    .setup-wrap {
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 20px; min-height: 80vh; justify-content: center;
    }
    .setup-card {
      background: var(--hub-surface, #fff);
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 8px);
      padding: 32px; max-width: 420px; width: 100%; text-align: center;
    }
    .setup-icon { font-size: 2.5rem; margin-bottom: 16px; }
    .setup-card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .setup-card .setup-desc { color: var(--hub-text-muted, #6b7280); font-size: 0.9rem; margin-bottom: 24px; }
    .setup-card .pick-label { font-weight: 600; margin-bottom: 12px; text-align: left; display: block; }
    .member-list { margin-bottom: 20px; }
    .member-option {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 6px);
      cursor: pointer; margin-bottom: 6px;
      transition: border-color .15s, background .15s; text-align: left;
    }
    .member-option input[type="radio"] { accent-color: var(--hub-primary, #6366f1); }
    .member-option:has(input:checked) {
      border-color: var(--hub-primary, #6366f1);
      background: color-mix(in srgb, var(--hub-primary, #6366f1) 6%, transparent);
    }
    .member-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .member-name { font-weight: 500; font-size: 0.95rem; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--hub-border, #e5e7eb); margin: 14px 20px 0; }
    .tab-btn {
      padding: 8px 16px; background: transparent; border: none; cursor: pointer;
      font-family: inherit; font-size: 0.9rem; font-weight: 500;
      color: var(--hub-text-muted, #6b7280);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--hub-primary, #6366f1); border-bottom-color: var(--hub-primary, #6366f1); }
    .tab-panel { display: none; padding: 16px 20px; }
    .tab-panel.active { display: block; }

    /* ── Surprise banner ── */
    .surprise-bar {
      background: var(--hub-surface, #fff);
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 8px);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .surprise-bar p { font-size: 0.9rem; color: var(--hub-text-muted, #6b7280); }

    /* ── Idea cards ── */
    .ideas-list { display: flex; flex-direction: column; gap: 10px; }
    .idea-card {
      background: var(--hub-surface, #fff);
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 8px);
      padding: 14px 16px;
    }
    .idea-card.done { opacity: .6; }
    .idea-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .idea-title { font-weight: 600; font-size: 0.95rem; flex: 1; }
    .idea-notes { font-size: 0.875rem; color: var(--hub-text-muted, #6b7280); margin-bottom: 8px; white-space: pre-wrap; word-break: break-word; }
    .idea-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .idea-tag { padding: 2px 8px; border-radius: 999px; background: var(--hub-bg, #f9fafb); border: 1px solid var(--hub-border, #e5e7eb); font-size: 0.78rem; color: var(--hub-text-muted, #6b7280); }
    .idea-footer { display: flex; align-items: center; justify-content: space-between; }
    .idea-meta { font-size: 0.8rem; color: var(--hub-text-muted, #6b7280); }
    .stars { color: #f59e0b; letter-spacing: 2px; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--hub-text-muted, #6b7280); }
    .empty-state .empty-icon { font-size: 2rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    /* ── Reveal modal (Surprise Me) ── */
    .reveal-card {
      text-align: center; padding: 8px 0 16px;
    }
    .reveal-emoji { font-size: 2.5rem; margin-bottom: 12px; }
    .reveal-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .reveal-tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
    .reveal-notes { font-size: 0.9rem; color: var(--hub-text-muted, #6b7280); margin-bottom: 16px; white-space: pre-wrap; }
    .reveal-actions { display: flex; gap: 8px; justify-content: center; }

    /* ── Tag chips (add form) ── */
    .tag-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .tag-chip {
      padding: 4px 10px; border-radius: 999px;
      border: 1px solid var(--hub-border, #e5e7eb);
      background: var(--hub-bg, #f9fafb);
      font-size: 0.82rem; cursor: pointer; transition: background .15s, border-color .15s;
    }
    .tag-chip.selected {
      background: color-mix(in srgb, var(--hub-primary, #6366f1) 12%, transparent);
      border-color: var(--hub-primary, #6366f1);
      color: var(--hub-primary, #6366f1); font-weight: 600;
    }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--hub-primary, #6366f1); color: var(--hub-primary-fg, #fff);
      border: none; border-radius: var(--hub-radius, 6px);
      padding: 10px 20px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover:not(:disabled) { opacity: .85; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary {
      background: transparent; color: var(--hub-text, #111827);
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 6px);
      padding: 10px 20px; font-size: 0.95rem; font-weight: 500; cursor: pointer;
    }
    .btn-secondary:hover { background: var(--hub-bg, #f9fafb); }
    .btn-ghost {
      background: transparent; border: none; cursor: pointer;
      color: var(--hub-text-muted, #6b7280); font-size: 0.85rem; padding: 4px 8px;
      border-radius: var(--hub-radius, 4px);
    }
    .btn-ghost:hover { background: var(--hub-bg, #f9fafb); color: var(--hub-text, #111827); }
    .btn-icon {
      background: transparent; border: none; cursor: pointer;
      color: var(--hub-text-muted, #6b7280); padding: 6px;
      border-radius: var(--hub-radius, 4px); font-size: 1rem; line-height: 1;
    }
    .btn-icon:hover { color: var(--hub-text, #111827); background: var(--hub-bg, #f9fafb); }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
    }
    .modal {
      background: var(--hub-surface, #fff);
      border-radius: var(--hub-radius, 8px);
      padding: 24px; width: 100%; max-width: 460px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      max-height: 90vh; overflow-y: auto;
    }
    .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 5px; font-size: 0.9rem; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 6px);
      background: var(--hub-bg, #f9fafb);
      color: var(--hub-text, #111827);
      font-family: inherit; font-size: inherit;
    }
    .form-group input:focus, .form-group textarea:focus { outline: 2px solid var(--hub-primary, #6366f1); outline-offset: 1px; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .star-row { display: flex; gap: 6px; }
    .star-btn { background: transparent; border: none; cursor: pointer; font-size: 1.4rem; padding: 2px; line-height: 1; transition: transform .1s; }
    .star-btn:hover { transform: scale(1.15); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  </style>
</head>
<body>

  <!-- ── Setup view ── -->
  <div id="view-setup" class="view">
    <div class="setup-wrap">
      <div class="setup-card">
        <div class="setup-icon">🌙</div>
        <h2>Date Night Planner</h2>
        <p class="setup-desc">Build a shared list of date ideas. Tap "Surprise Me" whenever you need inspiration.</p>
        <span class="pick-label">Who is your partner?</span>
        <div id="setup-members" class="member-list"></div>
        <button class="btn-primary" style="width:100%;justify-content:center" onclick="savePartner()">Get Started</button>
      </div>
    </div>
  </div>

  <!-- ── Main view ── -->
  <div id="view-main" class="view">
    <div class="app-header">
      <div class="app-header-left">
        <span class="icon">🌙</span>
        <h1>Date Nights</h1>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn-icon" title="Change partner" onclick="showSetup()">⚙️</button>
        <button class="btn-primary" onclick="openAddIdea()">+ Add Idea</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('ideas',this)">Ideas</button>
      <button class="tab-btn" onclick="switchTab('history',this)">History</button>
    </div>
    <div id="tab-ideas" class="tab-panel active">
      <div class="surprise-bar">
        <p>Not sure what to do? Let us pick.</p>
        <button class="btn-primary" onclick="surpriseMe()">✨ Surprise Me</button>
      </div>
      <div id="ideas-list" class="ideas-list"></div>
    </div>
    <div id="tab-history" class="tab-panel">
      <div id="history-list" class="ideas-list"></div>
    </div>
  </div>

  <script type="module">
    import { esc, initial, memberColor, formatRelativeDate } from "/hub-sdk.js";
    import { TAGS, validateIdea, parseTags, pickRandom } from "./logic.js";

    const CONTEXT = window.__CONTEXT_URL ?? "";
    const DB      = window.__DB_URL      ?? "";
    const ME      = window.__CURRENT_MEMBER ?? null;
    const APP_ID  = window.__APP_ID ?? "date-night-planner";

    let members  = [];
    let partner  = null;
    let ideas    = [];
    let modalEl  = null;
    let draftTags = [];

    async function db(sql, params = []) {
      if (!DB) return { rows: [] };
      const res = await fetch(DB, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sql, params }),
      });
      return res.json();
    }

    async function loadMembers() {
      if (!CONTEXT) {
        members = [
          { id: "demo-1", name: "Alex",   role: "adult" },
          { id: "demo-2", name: "Jordan", role: "adult" },
          { id: "demo-3", name: "Sam",    role: "adult" },
        ];
        return;
      }
      try {
        const res = await fetch(`${CONTEXT}?keys=family.members`);
        members = ((await res.json())["family.members"]) ?? [];
      } catch { members = []; }
    }

    async function loadPartner() {
      if (!ME) return null;
      const { rows } = await db(
        "SELECT partner_id FROM partner_config WHERE member_id = ?",
        [ME.id]
      );
      return rows.length ? (members.find(m => m.id === rows[0].partner_id) ?? null) : null;
    }

    async function loadIdeas() {
      if (!ME || !partner) {
        ideas = [
          { id: "d1", created_by: "demo-2", title: "Sunset picnic at the park", notes: "Bring the good blanket", tags: '["outdoors","budget"]', done_at: null, rating: null, created_at: new Date(Date.now() - 86400000).toISOString() },
          { id: "d2", created_by: "demo-1", title: "Sushi at Nobu", notes: "", tags: '["restaurant"]', done_at: null, rating: null, created_at: new Date(Date.now() - 172800000).toISOString() },
          { id: "d3", created_by: "demo-2", title: "Movie marathon at home", notes: "Sci-fi theme", tags: '["stay-in"]', done_at: new Date(Date.now() - 604800000).toISOString(), rating: 5, created_at: new Date(Date.now() - 700000000).toISOString() },
        ];
        return;
      }
      const { rows } = await db(
        "SELECT * FROM date_ideas WHERE created_by IN (?, ?) ORDER BY created_at DESC",
        [ME.id, partner.id]
      );
      ideas = rows;
    }

    window.savePartner = async function() {
      const sel = document.querySelector('#setup-members input[type="radio"]:checked');
      if (!sel) return;
      const partnerId = sel.value;
      const btn = document.querySelector('#view-setup .btn-primary');
      if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }
      try {
        if (ME) {
          await db(
            `INSERT INTO partner_config (member_id, partner_id) VALUES (?, ?)
             ON CONFLICT (member_id, household_id) DO UPDATE SET partner_id = EXCLUDED.partner_id`,
            [ME.id, partnerId]
          );
        }
        partner = members.find(m => m.id === partnerId) ?? null;
        await loadIdeas();
        showMain();
      } catch(e) {
        if (btn) { btn.disabled = false; btn.textContent = "Get Started"; }
        throw e;
      }
    };

    // ── Modal helpers ─────────────────────────────────────────────────────────
    function openModal(html) {
      closeModal();
      modalEl = document.createElement("div");
      modalEl.className = "modal-backdrop";
      modalEl.innerHTML = `<div class="modal">${html}</div>`;
      modalEl.addEventListener("click", e => { if (e.target === modalEl) closeModal(); });
      document.body.appendChild(modalEl);
    }
    window.closeModal = function() { modalEl?.remove(); modalEl = null; };

    // ── Add idea ──────────────────────────────────────────────────────────────
    window.openAddIdea = function() {
      draftTags = [];
      openModal(`
        <h3>Add Date Idea</h3>
        <div class="form-group">
          <label>What's the idea?</label>
          <input id="f-title" type="text" placeholder="e.g. Sunset picnic at the park" />
        </div>
        <div class="form-group">
          <label>Notes <span style="color:var(--hub-text-muted,#6b7280);font-weight:400">(optional)</span></label>
          <textarea id="f-notes" placeholder="Any details to remember…"></textarea>
        </div>
        <div class="form-group">
          <label>Tags</label>
          <div class="tag-chips">
            ${TAGS.map(t => `<button type="button" class="tag-chip" onclick="toggleTag('${t}',this)">${t}</button>`).join("")}
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" onclick="submitIdea()">Add</button>
        </div>
      `);
      document.getElementById("f-title").focus();
    };

    window.toggleTag = function(tag, el) {
      if (draftTags.includes(tag)) {
        draftTags = draftTags.filter(t => t !== tag);
        el.classList.remove("selected");
      } else {
        draftTags.push(tag);
        el.classList.add("selected");
      }
    };

    window.submitIdea = async function() {
      const titleInput = document.getElementById("f-title");
      const result = validateIdea(titleInput?.value);
      if (!result.valid) { titleInput?.focus(); return; }

      const btn = modalEl?.querySelector(".modal-actions .btn-primary");
      if (btn) { btn.disabled = true; btn.textContent = "Adding…"; }
      try {
        if (ME) {
          await db(
            "INSERT INTO date_ideas (id, created_by, title, notes, tags, created_at) VALUES (?, ?, ?, ?, ?, ?)",
            [crypto.randomUUID(), ME.id, result.trimmed,
             document.getElementById("f-notes")?.value.trim() ?? "",
             JSON.stringify(draftTags),
             new Date().toISOString()]
          );
          await loadIdeas();
        }
        closeModal();
        renderIdeas();
      } catch(e) {
        if (btn) { btn.disabled = false; btn.textContent = "Add"; }
        throw e;
      }
    };

    // ── Surprise Me ───────────────────────────────────────────────────────────
    window.surpriseMe = function() {
      const undone = ideas.filter(i => !i.done_at);
      const pick = pickRandom(undone);
      if (!pick) {
        openModal(`
          <div class="reveal-card">
            <div class="reveal-emoji">🤔</div>
            <div class="reveal-title">No ideas yet!</div>
            <p style="color:var(--hub-text-muted,#6b7280);font-size:.9rem;margin-bottom:16px">Add some ideas first, then let us surprise you.</p>
            <div class="reveal-actions">
              <button class="btn-primary" onclick="closeModal();openAddIdea()">Add an idea</button>
            </div>
          </div>
        `);
        return;
      }
      const tags = parseTags(pick.tags);
      openModal(`
        <div class="reveal-card">
          <div class="reveal-emoji">🌙</div>
          <div class="reveal-title">${esc(pick.title)}</div>
          ${tags.length ? `<div class="reveal-tags">${tags.map(t => `<span class="idea-tag">${esc(t)}</span>`).join("")}</div>` : ""}
          ${pick.notes ? `<div class="reveal-notes">${esc(pick.notes)}</div>` : ""}
          <div class="reveal-actions">
            <button class="btn-secondary" onclick="surpriseMe()">Try another</button>
            <button class="btn-primary" onclick="markDone('${esc(pick.id)}')">We did this! ✓</button>
          </div>
        </div>
      `);
    };

    // ── Mark done ─────────────────────────────────────────────────────────────
    window.markDone = function(id) {
      const idea = ideas.find(i => i.id === id);
      if (!idea) return;
      let rating = 0;
      openModal(`
        <h3>How was it?</h3>
        <p style="margin-bottom:16px;color:var(--hub-text-muted,#6b7280)">Rate <strong>${esc(idea.title)}</strong></p>
        <div id="star-row" class="star-row" style="justify-content:center;margin-bottom:20px">
          ${[1,2,3,4,5].map(n => `<button class="star-btn" onclick="setRating(${n})" data-star="${n}">☆</button>`).join("")}
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button id="confirm-done-btn" class="btn-primary" onclick="confirmDone('${esc(id)}')">Mark as Done</button>
        </div>
      `);
    };

    window.setRating = function(n) {
      document.querySelectorAll('.star-btn').forEach((btn, i) => {
        btn.textContent = i < n ? "★" : "☆";
      });
      window._draftRating = n;
    };

    window.confirmDone = async function(id) {
      const btn = document.getElementById("confirm-done-btn");
      if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }
      try {
        const rating = window._draftRating ?? null;
        if (ME) {
          await db(
            "UPDATE date_ideas SET done_at = ?, rating = ? WHERE id = ?",
            [new Date().toISOString(), rating, id]
          );
          await loadIdeas();
        }
        window._draftRating = null;
        closeModal();
        renderIdeas();
      } catch(e) {
        if (btn) { btn.disabled = false; btn.textContent = "Mark as Done"; }
        throw e;
      }
    };

    // ── Tabs ──────────────────────────────────────────────────────────────────
    window.switchTab = function(tab, btn) {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(`tab-${tab}`).classList.add("active");
    };

    // ── Views ─────────────────────────────────────────────────────────────────
    window.showSetup = function() {
      const otherAdults = members.filter(m => m.role === "adult" && m.id !== (ME?.id ?? "demo-1"));
      const listEl = document.getElementById("setup-members");
      listEl.innerHTML = otherAdults.map(m => {
        const color = memberColor(m.id, members);
        return `<label class="member-option">
          <input type="radio" name="partner" value="${esc(m.id)}" />
          <span class="member-avatar" style="background:${color}">${esc(initial(m.name))}</span>
          <span class="member-name">${esc(m.name)}</span>
        </label>`;
      }).join("");
      if (partner) {
        const radio = listEl.querySelector(`input[value="${CSS.escape(partner.id)}"]`);
        if (radio) radio.checked = true;
      }
      document.getElementById("view-setup").classList.add("active");
      document.getElementById("view-main").classList.remove("active");
    };

    function showMain() {
      document.getElementById("view-setup").classList.remove("active");
      document.getElementById("view-main").classList.add("active");
      renderIdeas();
    }

    function renderIdeas() {
      const undone  = ideas.filter(i => !i.done_at);
      const done    = ideas.filter(i => i.done_at).sort((a,b) => b.done_at.localeCompare(a.done_at));

      // Ideas tab
      const ideasEl = document.getElementById("ideas-list");
      if (!undone.length) {
        ideasEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🌙</div><p>No ideas yet — add your first one!</p></div>`;
      } else {
        ideasEl.innerHTML = undone.map(idea => renderIdeaCard(idea, false)).join("");
      }

      // History tab
      const histEl = document.getElementById("history-list");
      if (!done.length) {
        histEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📖</div><p>No completed dates yet.</p></div>`;
      } else {
        histEl.innerHTML = done.map(idea => renderIdeaCard(idea, true)).join("");
      }
    }

    function renderIdeaCard(idea, isDone) {
      const tags    = parseTags(idea.tags);
      const tagsHtml = tags.length ? `<div class="idea-tags">${tags.map(t => `<span class="idea-tag">${esc(t)}</span>`).join("")}</div>` : "";
      const notesHtml = idea.notes ? `<div class="idea-notes">${esc(idea.notes)}</div>` : "";
      const starsHtml = idea.rating ? `<span class="stars">${"★".repeat(idea.rating)}${"☆".repeat(5 - idea.rating)}</span>` : "";
      const footer = isDone
        ? `<div class="idea-footer"><span class="idea-meta">${formatRelativeDate(idea.done_at)}</span>${starsHtml}</div>`
        : `<div class="idea-footer"><span class="idea-meta">${formatRelativeDate(idea.created_at)}</span>
             <button class="btn-ghost" onclick="markDone('${esc(idea.id)}')">✓ Done</button>
           </div>`;
      return `
        <div class="idea-card${isDone ? " done" : ""}">
          <div class="idea-header"><span class="idea-title">${esc(idea.title)}</span></div>
          ${notesHtml}${tagsHtml}${footer}
        </div>`;
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    (async () => {
      await loadMembers();
      partner = await loadPartner();
      if (!partner) {
        window.showSetup();
      } else {
        await loadIdeas();
        showMain();
      }
    })();
  </script>
</body>
</html>
